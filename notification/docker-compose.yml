services:
  db:
    image: postgres:14.19-alpine3.21
    container_name: notification_service_db
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: notification_db
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  pgadmin:
    image: dpage/pgadmin4:9.9
    container_name: notification-service-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: audinjunior1@gmail.com
      PGADMIN_DEFAULT_PASSWORD: password
    ports:
      - "8061:80"
    depends_on:
      - db

volumes:
  postgres-data: