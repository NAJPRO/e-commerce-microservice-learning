services:
  db:
    image: mysql:8.0
    container_name: orderservice_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: orders_db
      MYSQL_USER: audin
      MYSQL_PASSWORD: password
    ports:
      - "3308:3306"
    volumes:
      - orderservice_data:/var/lib/mysql

volumes:
  orderservice_data:
