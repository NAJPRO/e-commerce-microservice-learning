spring.application.name=orderservice
server.servlet.context-path=/api/order-service
server.port=8091
spring.datasource.url=jdbc:mysql://localhost:3308/orders_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=audin
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

product.service.url=http://localhost:8081/api/product-service/products
inventory.service.url=http://localhost:8071/api/inventory-service/inventories


spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

logging.level.org.springframework.kafka: DEBUG
logging.level.org.apache.kafka: INFO